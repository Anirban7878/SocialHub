<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SocialHub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- THEME SWITCH -->
<div class="theme-switch">
  <input type="checkbox" id="themeToggle">
  <label for="themeToggle" class="slider"></label>
</div>

  <h1>🌐 SocialHub</h1>
  <p class="tagline">Search across the world’s top platforms</p>

  <!-- Search -->
  <div class="search-box">
    <input type="text" id="search" placeholder="Search anything... 🔍">
    <button onclick="searchAll()">Search All</button>
  </div>

  <div class="top-bar">

  <!-- ⚙️ Settings -->
  <div class="settings">
    <span id="settingsBtn">⚙️</span>

    <div id="settingsPanel" class="settings-panel">
      <h4>History</h4>
      <ul id="historyList"></ul>

      <button onclick="clearHistory()">🗑 Clear History</button>
    </div>
  </div>
</div>

  <div id="loader" class="loader">
  🤔 Thinking hard... internet bhi soch raha hai...
</div>

  <!-- Platforms -->
  <div class="platforms">

  <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" onclick="searchGoogle()" class="logo">
  
  <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" onclick="searchYouTube()" class="logo">
  
  <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" onclick="searchInstagram()" class="logo">
  
  <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" onclick="searchFacebook()" class="logo">
  
  <img src="https://cdn-icons-png.flaticon.com/512/174/174857.png" onclick="searchLinkedIn()" class="logo">
  
  <img src="https://cdn-icons-png.flaticon.com/512/733/733579.png" onclick="searchTwitter()" class="logo">

</div>

<div class="tabs"></div>

<div class="tab-content">
  <iframe id="viewer"></iframe>
</div>

</div>

  <script src="script.js"></script>
</body>
</html>
